<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayPal</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  #c { min-height: 40px; }
</style>
</head>
<body>
<div id="c"></div>
<script>
/* Isolated PayPal hosted-button host. The PayPal SDK runs inside this iframe's
   own document/JS context, so any global style, viewport, or layout effect it
   has cannot reach the parent page (this fixes the SDK breaking the site nav).
   Communicates with the parent via postMessage: height (auto-resize) + fail. */
(function () {
  var id = new URLSearchParams(location.search).get('id') || '';
  function send(msg) {
    try { parent.postMessage(Object.assign({ source: 'pp-btn', id: id }, msg), '*'); } catch (e) {}
  }
  function fail() { send({ type: 'fail' }); }
  function reportHeight() { send({ type: 'height', height: document.body.scrollHeight }); }

  if (!/^[A-Za-z0-9]{6,30}$/.test(id)) { fail(); return; }

  var s = document.createElement('script');
  s.src = 'https://www.paypal.com/sdk/js?client-id=BAAwa_9Bodol9079jEnwSEiR_VDS5zWmH0djpJxqABTtcdDqPNeK1pdWGAdTV3e2OSD6iffCdMQg3bKJaY&components=hosted-buttons&disable-funding=venmo,paylater&currency=EUR';
  s.crossOrigin = 'anonymous';
  s.onerror = fail;
  s.onload = function () {
    try {
      if (!window.paypal || !window.paypal.HostedButtons) { fail(); return; }
      window.paypal.HostedButtons({ hostedButtonId: id }).render('#c');
      send({ type: 'rendered' });
      if (window.ResizeObserver) { new ResizeObserver(reportHeight).observe(document.body); }
      [600, 1500, 3000, 5000].forEach(function (t) { setTimeout(reportHeight, t); });
    } catch (e) { fail(); }
  };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
